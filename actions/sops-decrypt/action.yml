# Composite action: decrypt a sops file using the org-level CI age key.
# Usage from a consumer workflow:
#   - uses: Rubio-Enterprises/.github/actions/sops-decrypt@<sha>
#     with:
#       file: secrets.staging.enc.yaml
#       age-key: ${{ secrets.SOPS_AGE_KEY }}
# Output: `path` — the absolute path of the decrypted file (KEY=value, dotenv format),
# suitable for `EnvironmentFile=`-style consumption.
name: 'sops decrypt'
description: 'Decrypt a sops-encrypted file using the org CI age key. Wraps step-security/mozilla-sops-action.'
inputs:
  file:
    description: 'Path of the sops-encrypted file to decrypt (relative to the consumer repo root).'
    required: true
  age-key:
    description: 'Full content of the age private key (the CI key from secrets.SOPS_AGE_KEY).'
    required: true
outputs:
  path:
    description: 'Absolute path of the decrypted dotenv file.'
    value: ${{ steps.decrypt.outputs.path }}
runs:
  using: composite
  steps:
    - uses: step-security/mozilla-sops-action@v1.6.1
    - id: decrypt
      shell: bash
      env:
        SOPS_AGE_KEY: ${{ inputs.age-key }}
        SOPS_FILE: ${{ inputs.file }}
      run: |
        set -euo pipefail
        out=$(mktemp -t sops-decrypted.XXXXXX.env)
        # `--output-type dotenv` is required for downstream EnvironmentFile=-style use.
        # The encrypted file must be a flat top-level mapping; nested mappings cause sops
        # to ERROR ("cannot use complex value in dotenv file") — fail loud at decrypt time.
        sops --decrypt --output-type dotenv --output "$out" "$SOPS_FILE"
        chmod 0400 "$out"
        echo "path=$out" >> "$GITHUB_OUTPUT"
