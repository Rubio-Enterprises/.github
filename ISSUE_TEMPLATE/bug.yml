name: Bug
description: Report a bug or unexpected behaviour.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concrete description; include relevant log / output snippets.
    validations: { required: true }
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1.
        2.
        3.
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which commit, tag, or release exhibits the bug?
    validations: { required: false }
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, anything else relevant.
    validations: { required: false }
