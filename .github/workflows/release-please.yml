# release-please: opens / updates a release PR on every push to main.
# When the release PR is merged, release-please tags + creates a GitHub
# release, and the follow-up step below moves the floating major tag
# (v1, v2, …) to the release commit.
#
# The floating tag is load-bearing: consumer repos pin these reusable
# workflows by SHA with a `# v1` comment that tells Renovate which tag to
# track, so Renovate only bumps consumer pins when the floating tag moves.
# Before this workflow the tag was moved by hand and drifted twice (v1
# lagged both the latest semver tag and the SHAs consumers actually ran).
# Cutting releases and moving the major tag in one motion makes that
# drift impossible.

name: release-please
# `on:` is quoted to satisfy `yaml[truthy]` (yamllint + ansible-lint): without
# quotes, YAML 1.1 parsers fold `on` into the boolean `On`. GitHub Actions
# resolves the key by name regardless, and actionlint accepts both forms.
"on":
  push:
    branches: [main]

permissions:
  contents: write # tag + create release + move the floating major tag
  pull-requests: write # open / update the release PR

jobs:
  release-please:
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      # App token so the release PR triggers workflows. PRs created with the
      # default GITHUB_TOKEN fire NO events (Actions loop-prevention) — the
      # ruleset-injected gates (pr-title, secret-scan) never ran on release
      # PRs, leaving every one BLOCKED until a human close/reopened it
      # (needed for both 1.8.1 and 2.0.0 on 2026-07-07/08).
      - uses: actions/create-github-app-token@v3
        id: rp-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ steps.rp-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # fetch-depth: 0 so the release commit is guaranteed present locally
      # even if pushes raced between trigger and tag creation. SHA-pinned
      # (unlike the read-only workflows' floating @v6): this job holds
      # contents:write and pushes the org-consumed floating tag, so checkout
      # is a tag-hijack vector here. persist-credentials stays at its default
      # (true) on purpose — the tag push below authenticates with it, and no
      # artifacts are uploaded that could leak it.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
      - name: Move floating major tag to the release commit
        if: ${{ steps.release.outputs.release_created }}
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          # v1.2.3 -> v1; a future v2.0.0 moves v2 and leaves v1 alone.
          major="${TAG_NAME%%.*}"
          git push origin "+${RELEASE_SHA}:refs/tags/${major}"
          # Verify the push actually moved the tag. A silent retag failure is
          # exactly how the floating major drifts from the release it must
          # track (Renovate's `# v1` pins then become lies), so fail loudly
          # instead of fire-and-forget. The floating-tag-floor-check workflow
          # is the periodic backstop; this is the inline release-time check.
          git fetch --force origin "refs/tags/${major}:refs/tags/${major}"
          got="$(git rev-parse "refs/tags/${major}^{commit}")"
          want="$(git rev-parse "${RELEASE_SHA}^{commit}")"
          if [ "$got" != "$want" ]; then
            echo "::error::floating tag ${major} did not advance: ${got} != ${want}"
            exit 1
          fi
          echo "::notice::floating tag ${major} verified at ${got}"
