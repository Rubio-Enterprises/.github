name: rust test (reusable)
# Consumer-called reusable (Swatinem cache + `mise run test`, nextest JUnit) AND
# the ruleset-injected `gate-rust-tests` Required Governance Workflow. The direct
# `pull_request` / `merge_group` triggers are what let a Terraform org ruleset
# target it at rust-* repos; ruleset injection auto-triggers those events and
# ignores event filters, so there are no path/branch filters. The `detect` guard
# keeps the gate green (defensive) if it is ever attached to a non-Rust repo.
"on":
  workflow_call:
    inputs:
      timeout-minutes: { type: number, default: 20 }
  pull_request:
  merge_group:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  rust-test:
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    # `inputs.timeout-minutes` is empty on a direct pull_request / merge_group
    # (no workflow_call inputs), so fall back to the same 20-minute default.
    timeout-minutes: ${{ inputs.timeout-minutes || 20 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Detect Rust project
        # No Cargo.toml (a mis-targeted repo, or .github itself) -> skip the test
        # steps and pass with a notice. Consumers that call this via workflow_call
        # always carry Cargo.toml, so they run normally.
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
            echo "::notice::no Cargo.toml — repo is not a Rust archetype; rust-test gate passes (defensive)"
          fi
      # uv on PATH routes mise's pipx-backend installs through uvx (see the other
      # mise-based reusables for the full rationale).
      - if: steps.detect.outputs.rust == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # Fingerprint the uv-resolved python into the mise cache key (standards#331).
      # mise routes pipx installs through uvx, whose venvs carry a shebang pointing
      # at the uv-MANAGED python under ~/.local/share/uv/python — OUTSIDE the
      # ~/.local/share/mise tree jdx/mise-action caches. When uv's default python
      # bumps (e.g. 3.14.3 → 3.14.4), a cache restored onto a fresh runner VM hands
      # back pipx venvs whose shebang points at an interpreter that VM lacks, so
      # every tool dies with "couldn't exec process" — a permanently poisoned cache
      # no re-run fixes. Folding the version into cache_key_prefix makes a python
      # bump INVALIDATE the cache instead of poisoning it. `uv python find` never
      # downloads and can fall back to a system python, so install first
      # (idempotent — the same managed interpreter uvx would provision anyway),
      # then read the managed version.
      - name: Fingerprint the uv-resolved python for the mise cache key
        if: steps.detect.outputs.rust == 'true'
        id: uv-python
        shell: bash
        run: |
          set -euo pipefail
          uv python install
          version="$(uv python find --managed-python --show-version)"
          if [ -z "$version" ]; then
            echo "::error::could not resolve the uv-managed python version for the mise cache key" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          echo "uv-resolved python for mise cache key: $version"
      - if: steps.detect.outputs.rust == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          # Key the mise cache to the uv-resolved python (standards#331): a python
          # bump changes the prefix and invalidates rather than poisons the cache.
          cache_key_prefix: mise-v1-uvpy${{ steps.uv-python.outputs.version }}
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"
      - if: steps.detect.outputs.rust == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - if: steps.detect.outputs.rust == 'true'
        run: mise run test
      - if: always() && steps.detect.outputs.rust == 'true'
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        with: { report_paths: 'target/nextest/ci/junit.xml' }
      - if: always() && steps.detect.outputs.rust == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-test-reports-${{ github.run_id }}
          path: target/nextest/ci/
          retention-days: 14

  gate:
    # Bucket job — always reports so the required check never hangs "Expected".
    needs: [rust-test]
    if: always()
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - name: Aggregate gate result
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "dependency results: $RESULTS"
          for r in $RESULTS; do
            case "$r" in
              failure|cancelled)
                echo "::error::rust-test gate failed (a dependency reported '$r')"
                exit 1
                ;;
            esac
          done
          echo "rust-test gate passed"
