name: secret scan (reusable)
"on":
  workflow_call:
    inputs:
      mode:
        description: 'gitleaks (PR) or trufflehog (scheduled)'
        type: string
        # Defaulted to `gitleaks` so this file can double as the ruleset-injected
        # `gate-secret-scan` Required Governance Workflow: on a direct
        # `pull_request` / `merge_group` there is no `mode` input, and the PR-time
        # default is the gitleaks diff scan. Existing `workflow_call` callers that
        # pass `mode: gitleaks` / `mode: trufflehog` are unaffected.
        required: false
        default: gitleaks
  # Direct triggers make this a required-workflow entry (ruleset injection
  # auto-triggers these and ignores event filters — no path/branch filters).
  pull_request:
  merge_group:
permissions: { contents: read }
jobs:
  gitleaks:
    # Runs when explicitly asked (`mode: gitleaks`) OR on a direct
    # `pull_request` / `merge_group` (where `inputs.mode` is empty and gitleaks
    # is the default). A `workflow_call` from a consumer PR sets
    # `github.event_name == 'pull_request'` too, so existing callers still match.
    if: >-
      inputs.mode == 'gitleaks'
      || github.event_name == 'pull_request'
      || github.event_name == 'merge_group'
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { fetch-depth: 0 }
      # Content resolution: read the consumer's `ring` custom property with the
      # run's own token and pick the standards channel branch. `ring == canary`
      # resolves `standards@canary`; everything else (fleet / unset / unreadable)
      # resolves `standards@stable`. Fail-safe: any read error falls through to
      # `stable`. Same pattern as the lint-format / pr-title gates. Replaces the
      # frozen `audit/v1` clone pin (retired after the sweep). Works in both the
      # ruleset-injected direct-trigger path and the `workflow_call` path
      # (`github.repository` is the consumer repo in both).
      - name: Resolve standards channel from the repo `ring` property
        id: channel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ring="$(gh api "/repos/${{ github.repository }}/properties/values" \
            --jq '.[] | select(.property_name == "ring") | .value' 2>/dev/null || true)"
          if [ "$ring" = "canary" ]; then
            channel=canary
          else
            channel=stable
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "::notice::resolved standards channel '$channel' (ring='${ring:-<unset>}')"
      # standards is private: mint a read-only standards-reader App token to clone
      # it (org secrets arrive via the consumer's `secrets: inherit`).
      - name: Mint standards-reader token (read-only on standards)
        id: standards-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.STANDARDS_READER_APP_ID }}
          private-key: ${{ secrets.STANDARDS_READER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: standards
          permission-contents: read
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Rubio-Enterprises/standards
          ref: ${{ steps.channel.outputs.channel }}
          path: .standards
          token: ${{ steps.standards-token.outputs.token }}
          persist-credentials: false   # read-only checkout; don't leave a token in .standards/.git
      # One observable answer to "what standards version is this job running?".
      # Mirrors the echo in audit.yml so both audit gates resolve the same
      # channel ref (no pin asymmetry between gitleaks and the audit gate); the
      # resolved-SHA echo feeds the Layer 5 convergence dashboard.
      - name: Echo resolved standards ref
        run: echo "standards \`${{ steps.channel.outputs.channel }}\` resolved to \`$(git -C .standards rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true), enforcing minimum_release_age via uv's --exclude-newer.
      # Without uv, mise >= 2026.6.2 falls back to pip's --uploaded-prior-to,
      # which cold runners' bootstrap pip (< 26) rejects — install hard-fails.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: .standards
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"
      # PR events scan only the PR-diff range. Inherited fork history and
      # pre-existing in-repo debt are excluded from the PR-event gate — a PR
      # should validate ITS diff, not arbitrary commit ancestors. Push events
      # scope to the pushed commit range (before..after) for the same reason:
      # a push gate should validate what the push introduced. Schedule and
      # workflow_dispatch fall through to a full-history scan (empty log-opts)
      # so inherited debt still surfaces on a slower cadence. The scheduled
      # weekly trufflehog (separate job below) also covers tree-wide entropy.
      - name: Compute gitleaks log-opts
        id: log-opts
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
          MG_BASE: ${{ github.event.merge_group.base_sha }}
          MG_HEAD: ${{ github.event.merge_group.head_sha }}
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "value=${PR_BASE}..${PR_HEAD}" >> "$GITHUB_OUTPUT"
              ;;
            merge_group)
              # Scope the merge-queue scan to the queued range so a required
              # gate doesn't pay for a full-history scan on every merge_group.
              echo "value=${MG_BASE}..${MG_HEAD}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              echo "value=${PUSH_BEFORE}..${PUSH_AFTER}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "value=" >> "$GITHUB_OUTPUT"
              ;;
          esac
      # `--verbose` prints per-finding details to stdout for triage; `--report-path`
      # writes the JSON report that's uploaded as an artifact on failure. Without
      # these flags, the reusable only reports `leaks found: N` and there's no way
      # to investigate why CI disagrees with local scans (see super-productivity
      # PR #17 — local 0 leaks, CI 12 leaks, no path data to triage).
      - name: Run gitleaks
        env:
          LOG_OPTS: ${{ steps.log-opts.outputs.value }}
        run: |
          args=(detect --redact --no-banner --source . --verbose
                --report-path gitleaks-report.json)
          if [ -n "$LOG_OPTS" ]; then
            args+=(--log-opts="$LOG_OPTS")
          fi
          gitleaks "${args[@]}"
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
  trufflehog:
    if: inputs.mode == 'trufflehog'
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { fetch-depth: 0 }
      # The trufflehog CLI binary (not the trufflesecurity/trufflehog Docker
      # container action): the action mounts /var/run/docker.sock, which
      # neither the self-hosted `glue` container nor the hosted `ubuntu-slim`
      # image provides — no Docker daemon, so the action failed on every
      # scheduled run. The binary runs on any runner, so routing stays on
      # RUNNER_GLUE/ubuntu-slim unchanged (free self-hosted for private,
      # hosted for public). The installer auto-detects OS/arch (glue=arm64,
      # ubuntu-slim=x64), so the invocation is arch-agnostic.
      - name: Install trufflehog
        env:
          # renovate: datasource=github-releases depName=trufflesecurity/trufflehog
          TRUFFLEHOG_VERSION: v3.95.5
        run: |
          # Pin the installer script to the same release tag as the binary (not
          # `main`), so an upstream change to the script can't alter what we run.
          # The script still verifies the downloaded binary against the release
          # checksums, so a tag-pinned script is sufficient hardening here.
          curl -sSfL "https://raw.githubusercontent.com/trufflesecurity/trufflehog/${TRUFFLEHOG_VERSION}/scripts/install.sh" \
            | sh -s -- -b "$RUNNER_TEMP/bin" "$TRUFFLEHOG_VERSION"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      # `--results=verified`: fail only on findings trufflehog confirmed live, not
      # unverifiable format-matches. The `unknown` tier (and the `.trufflehogignore`
      # path-suppression opt-out that existed to silence its noise) were removed
      # because on this fork-heavy fleet that tier surfaced placeholder/example
      # creds, not real secrets; PR-time gitleaks still gates new format-matches.
      # `--fail` makes a finding exit non-zero rather than only print.
      - name: Run trufflehog
        run: trufflehog git file://. --results=verified --fail
