name: secret scan (reusable)
on:
  workflow_call:
    inputs:
      mode:
        description: 'gitleaks (PR) or trufflehog (scheduled)'
        type: string
        required: true
permissions: { contents: read }
jobs:
  gitleaks:
    if: inputs.mode == 'gitleaks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/checkout@v6
        with:
          repository: Rubio-Enterprises/standards
          ref: v1.0.0
          path: .standards
      - uses: jdx/mise-action@v4
        with:
          working_directory: .standards
      - run: gitleaks detect --redact --no-banner --source .
  trufflehog:
    if: inputs.mode == 'trufflehog'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@v3.95.2
        with: { extra_args: --results=verified,unknown }
