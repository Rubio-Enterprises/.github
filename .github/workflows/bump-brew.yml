name: bump-homebrew-git (reusable)
# Bump a :git-strategy Homebrew formula in the tap to the tag that triggered the
# caller. These formulae build from source — `url "git@…", using: :git, tag:,
# revision:` — so there is no release tarball or sha256 to update. The workflow
# updates the tag, the commit it points at, and an explicit Homebrew version line so
# `brew outdated` can detect post-release tag bumps. This replaces
# mislav/bump-homebrew-formula-action, which
# only rewrites url+sha256 tarball formulae and 404s on a private repo's archive.
#
# `on:` is quoted to satisfy yaml[truthy] (YAML 1.1 folds bare `on` into `On`).
"on":
  workflow_call:
    inputs:
      formula-name:
        description: Formula basename in the tap, i.e. Formula/<formula-name>.rb
        type: string
        required: true
      tap:
        description: owner/repo of the Homebrew tap to update
        type: string
        default: Rubio-Enterprises/homebrew-tap
    secrets:
      tap-token:
        description: PAT with contents:write on the tap (used to push the bump)
        required: true
permissions:
  contents: read
jobs:
  bump:
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tap }}
          token: ${{ secrets.tap-token }}
      - name: Rewrite formula tag + revision
        env:
          FORMULA: ${{ inputs.formula-name }}
          TAP: ${{ inputs.tap }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9][0-9A-Za-z.+~_-]*$ ]] || { echo "::error::unexpected tag '${TAG}'"; exit 1; }
          f="Formula/${FORMULA}.rb"
          test -f "$f" || { echo "::error::${f} not found in ${TAP}"; exit 1; }
          grep -q 'using: :git' "$f" || { echo "::error::${f} is not a :git formula"; exit 1; }
          ruby - "$f" "$TAG" "$SHA" "${TAG#v}" <<'RUBY'
          formula_path, tag, sha, version = ARGV
          lines = File.readlines(formula_path)

          url_stanzas = []
          lines.each_with_index do |line, index|
            next unless line.match?(/^  url\s+/)

            finish = index
            while finish + 1 < lines.length && lines[finish].rstrip.end_with?(",")
              finish += 1
            end

            stanza = lines[index..finish].join
            url_stanzas << [index, finish, stanza] if stanza.include?("using: :git")
          end

          if url_stanzas.empty?
            warn "::error::#{formula_path} does not have a top-level :git url stanza"
            exit 1
          end

          if url_stanzas.length > 1
            warn "::error::#{formula_path} has multiple top-level :git url stanzas"
            exit 1
          end

          start_index, finish_index, stanza = url_stanzas.first

          tag_count = stanza.scan(/tag:\s*"[^"]*"/).length
          revision_count = stanza.scan(/revision:\s*"[0-9a-f]*"/).length
          unless tag_count == 1 && revision_count == 1
            warn "::error::expected one tag: and one revision: in #{formula_path}'s top-level :git url stanza"
            exit 1
          end

          stanza = stanza.sub(/tag:\s*"[^"]*"/, %(tag: "#{tag}"))
          stanza = stanza.sub(/revision:\s*"[0-9a-f]*"/, %(revision: "#{sha}"))
          lines[start_index..finish_index] = stanza.lines

          version_line_indexes = lines.each_index.select do |index|
            lines[index].match?(/^  version\s+"[^"]*"\s*$/)
          end

          if version_line_indexes.length > 1
            warn "::error::#{formula_path} has multiple top-level version lines"
            exit 1
          elsif version_line_indexes.one?
            lines[version_line_indexes.first] = %(  version "#{version}"\n)
          else
            lines.insert(finish_index + 1, %(  version "#{version}"\n))
          end

          File.write(formula_path, lines.join)
          RUBY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$f"
          if git diff --cached --quiet; then
            echo "::notice::${FORMULA} already at ${TAG}; nothing to bump"
          else
            git commit -m "chore(${FORMULA}): bump to ${TAG}"
            git push
          fi
