name: copier sync (reusable)
"on":
  workflow_call:
    inputs:
      vcs-ref:
        description: 'Copier --vcs-ref to update against (default: floating template/v1)'
        type: string
        required: false
        default: 'template/v1'
      base-branch:
        description: 'Base branch the PR targets (default: repo default branch resolved at runtime)'
        type: string
        required: false
        default: ''
  # `pull_request` trigger satisfies GitHub's organization-ruleset
  # `required_workflows` validator (422 otherwise). On PRs against `.github`
  # itself it's a no-op via the job-level `if:` guard.
  pull_request:

permissions:
  contents: read

jobs:
  copier-sync:
    if: >-
      github.event_name != 'pull_request' ||
      github.repository != 'Rubio-Enterprises/.github'
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    # Job-scoped writes: only this job needs to push a branch and open a PR.
    # The workflow-level `permissions: contents: read` keeps other jobs least-priv.
    permissions:
      contents: write
      pull-requests: write
    steps:
      # GITHUB_TOKEN (a GitHub App token) is REFUSED by GitHub when a push
      # creates/updates a file under .github/workflows/ without the `workflows`
      # permission — and `workflows` is not a grantable `permissions:` key. Since
      # a copier-update of standards.yml itself (new jobs, reusable-SHA bumps) is
      # exactly such a change, the default token can't push it. Mint a dedicated
      # copier-sync App token (contents + pull-requests + workflows) and use it
      # for checkout + push + PR-create. The App must be installed on the
      # consumer repo and COPIER_SYNC_APP_ID / _PRIVATE_KEY available as secrets
      # (org-level, passed via `secrets: inherit` from the caller's standards.yml).
      - name: Mint copier-sync App token (workflow-scoped; GITHUB_TOKEN can't push standards.yml)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.COPIER_SYNC_APP_ID }}
          private-key: ${{ secrets.COPIER_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out consumer (full history; copier needs the previous commit)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # App token (not GITHUB_TOKEN): persisted for the push below, which
          # touches .github/workflows/standards.yml and needs `workflows` scope.
          token: ${{ steps.app-token.outputs.token }}

      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true), enforcing minimum_release_age via uv's --exclude-newer.
      # Without uv, mise >= 2026.6.2 falls back to pip's --uploaded-prior-to,
      # which cold runners' bootstrap pip (< 26) rejects — install hard-fails.
      - name: Install uv (routes mise pipx installs through uvx)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Bootstrap mise (resolves consumer's pinned copier + python)
        uses: jdx/mise-action@v4
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.11"

      - name: Ensure copier is on PATH (belt-and-braces; template also pins pipx:copier)
        shell: bash
        run: |
          set -euo pipefail
          # Consumers not yet re-rendered with the standards `pipx:copier` pin
          # have no copier in their mise tool set, so the bare `copier update`
          # below would exit 127. Install it explicitly when mise didn't supply
          # it. Once a consumer re-renders with the pinned template, mise
          # provides copier and this becomes a no-op.
          if ! command -v copier >/dev/null 2>&1; then
            pipx install "copier==9.*"
          fi
          copier --version

      - name: Resolve current consumer template SHA + target SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .copier-answers.yml ]; then
            echo "::notice::repo has no .copier-answers.yml — skipping (not standards-onboarded)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Read the persisted template ref from the canonical Rubio sentinel
          # field `_rubio_template_version` (introduced by standards
          # `template/v1.24.0`, task #15 phase 1; sole source after phase 3).
          # Copier's built-in `_commit` is no longer consulted here — it
          # conflates provenance pin with drift sentinel and was retired as a
          # drift source in phase 3.
          current=$(awk '/^_rubio_template_version:/{ print $2 }' .copier-answers.yml)
          if [ -z "$current" ]; then
            echo "::error::missing \`_rubio_template_version\` in .copier-answers.yml"
            echo "::error::consumer must be on standards \`template/v1.24.0\` or later"
            echo "::error::remediate: copier update --vcs-ref=template/v1 --defaults --trust"
            exit 1
          fi
          echo "current: $current"
          # Resolve the target ref's actual SHA via the GitHub API so we can
          # short-circuit the no-op case without invoking copier.
          target_sha=$(gh api "/repos/Rubio-Enterprises/standards/commits/${{ inputs.vcs-ref }}" --jq '.sha')
          current_sha=$(gh api "/repos/Rubio-Enterprises/standards/commits/${current}" --jq '.sha' 2>/dev/null || echo "")
          if [ "$current_sha" = "$target_sha" ]; then
            echo "::notice::already at target SHA $target_sha — no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "current=$current" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.vcs-ref }}" >> "$GITHUB_OUTPUT"
            echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run copier update
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # --skip-answered: don't re-prompt for any answer the user previously
          #                  supplied. --trust + --defaults: required for
          #                  unattended runs; --trust acknowledges _tasks
          #                  execution, --defaults fills unanswered new
          #                  questions with their declared defaults.
          # --conflict inline: leave merge markers in conflicting files so the
          #                    reviewer can resolve in the PR rather than the
          #                    workflow silently dropping the consumer's edit.
          # NOTE: no --overwrite — that switch exists only on `copier copy`;
          #       `copier update` always applies the template diff to managed
          #       files (copier 9.x rejects unknown switches with exit 2).
          copier update \
            --skip-answered \
            --trust \
            --defaults \
            --conflict inline \
            --vcs-ref="${{ steps.resolve.outputs.target }}"

      - name: Detect rendered drift
        if: steps.resolve.outputs.skip != 'true'
        id: drift
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "::notice::no rendered drift — answers file alone would update; exiting clean"
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            # Capture the affected file list for the PR body.
            git diff --name-status > /tmp/copier-sync-diff-namestatus.txt
            # Capture any conflict markers so the reviewer can spot them.
            grep -rl '<<<<<<< before updating' . --exclude-dir=.git > /tmp/copier-sync-conflicts.txt || true
          fi

      - name: Open PR
        if: steps.resolve.outputs.skip != 'true' && steps.drift.outputs.drift == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Resolve base branch — empty input means "use repo's default branch".
          base="${{ inputs.base-branch }}"
          if [ -z "$base" ]; then
            base=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')
          fi
          isodate=$(date -u +%Y-%m-%d)
          short_sha=$(echo "${{ steps.resolve.outputs.target_sha }}" | cut -c1-7)
          branch="chore/copier-update-${isodate}-${short_sha}"
          git checkout -b "$branch"
          git -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c user.name='github-actions[bot]' \
              commit -am "chore: copier update ${{ steps.resolve.outputs.current }} -> ${{ steps.resolve.outputs.target }} ($short_sha)"
          git push origin "$branch"
          # PR body: source bump, files changed (from `git diff --name-status`),
          # link to release notes between old/new, and a conflict-marker call-out
          # if any inline markers were left by --conflict inline.
          {
            echo "## Template-bump sync"
            echo
            cur='${{ steps.resolve.outputs.current }}'
            tgt='${{ steps.resolve.outputs.target }}'
            echo "**Source:** \`${cur}\` → \`${tgt}\` (\`$short_sha\`)"
            echo
            cmp="https://github.com/Rubio-Enterprises/standards/compare/${cur}...${tgt}"
            echo "**Release notes:** $cmp"
            echo
            echo "**Files changed:**"
            echo
            echo '```'
            cat /tmp/copier-sync-diff-namestatus.txt
            echo '```'
            if [ -s /tmp/copier-sync-conflicts.txt ]; then
              echo
              echo "**⚠ Conflict markers (resolve before merging):**"
              echo
              echo '```'
              cat /tmp/copier-sync-conflicts.txt
              echo '```'
            fi
            echo
            echo "_Automated by \`copier-sync.yml\` reusable workflow._"
          } > /tmp/copier-sync-pr-body.md
          # Create the PR FIRST, WITHOUT labels. `gh pr create --label X`
          # aborts the ENTIRE creation when X doesn't exist, and fleet
          # consumers don't all carry `standards-template-drift` (webfetch
          # didn't — the bootstrap canary surfaced this). The copier-sync App
          # token also lacks `issues: write`, so label management can fail even
          # when the label exists. The PR is the load-bearing artifact; labels
          # are advisory. Attach them best-effort AFTER creation so a missing
          # label or a label-permission gap can never block a sync PR.
          pr_url=$(gh pr create \
            --base "$base" \
            --head "$branch" \
            --title "chore: copier update ${{ steps.resolve.outputs.current }} -> ${{ steps.resolve.outputs.target }}" \
            --body-file /tmp/copier-sync-pr-body.md)
          echo "::notice::opened sync PR $pr_url"
          # Best-effort labels: ensure they exist, then attach. Each call is
          # tolerant — `gh label create --force` is idempotent but needs
          # issues:write (the App may lack it), and the attach may 403; none of
          # that must fail the run now that the PR already exists.
          gh label create dependencies --color 0366d6 --description "Dependency updates" --force >/dev/null 2>&1 || true
          gh label create standards-template-drift --color c5def5 --description "rubio-standards template drift" --force >/dev/null 2>&1 || true
          gh pr edit "$pr_url" --add-label dependencies --add-label standards-template-drift >/dev/null 2>&1 || true
        env:
          # App token so the PR is authored by the copier-sync App and matches
          # the credential that pushed the branch (the push needs workflows scope).
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
