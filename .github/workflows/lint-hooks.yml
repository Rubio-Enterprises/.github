name: lint hooks (reusable)
# CI gate that runs the consumer's lefthook commands. Normal repos run across
# all files, validating the hook-tool surface (lefthook + the pinned tools
# backing each command) end-to-end. Forks run only against the PR's changed
# files: inherited upstream debt should not block a standards migration, but
# changed fork files still need the same hook coverage.
#
# Runner routing: a cheap `detect` job reads the consumer's `.copier-answers.yml`
# archetype and sends the lint-hooks job to macOS for `swift-*` archetypes —
# swiftformat/swiftlint need sourcekitd, which the Linux glue runner lacks, so
# there they die with `swiftformat_linux: not found` / `Loading
# libsourcekitdInProc.so failed`. Every other archetype stays on RUNNER_GLUE.
#
# Consumer thin-callers invoke this via `uses:`. The `pull_request:` trigger is
# required so GitHub's org-ruleset `required_workflows` validator accepts the
# workflow (422 otherwise — same precedent as audit.yml). On PRs against
# `.github` itself the pull_request path is a no-op (this is a reusable, not a
# project workflow) — enforced by the job-level `if:` guards below, since the
# `.github` repo doesn't ship a `.mise.toml` or `lefthook.yml` and would fail
# the `mise exec -- lefthook` invocation otherwise.
"on":
  workflow_call:
  pull_request:
permissions:
  contents: read
jobs:
  detect:
    # Resolve the runner from the consumer's archetype: swift-* needs macOS
    # (sourcekitd); everything else uses the glue/ubuntu-slim tier. Reading
    # .copier-answers.yml tracks the authoritative archetype rather than
    # file-sniffing for Package.swift.
    if: >-
      github.event_name != 'pull_request' ||
      github.repository != 'Rubio-Enterprises/.github'
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
      is_fork: ${{ steps.pick.outputs.is_fork }}
    steps:
      - name: Sparse-checkout the consumer's .copier-answers.yml
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: .copier-answers.yml
          sparse-checkout-cone-mode: false
      - name: Pick runner from archetype
        id: pick
        env:
          MACOS_RUNNER: ${{ vars.RUNNER_MACOS || '["macos-15"]' }}
          GLUE_RUNNER: ${{ vars.RUNNER_GLUE || '["ubuntu-slim"]' }}
        shell: bash
        run: |
          if grep -qE '^archetype:[[:space:]]*swift' .copier-answers.yml 2>/dev/null; then
            printf 'runner=%s\n' "$MACOS_RUNNER" >> "$GITHUB_OUTPUT"
          else
            printf 'runner=%s\n' "$GLUE_RUNNER" >> "$GITHUB_OUTPUT"
          fi
          if grep -qE '^is_fork:[[:space:]]*true' .copier-answers.yml 2>/dev/null; then
            printf 'is_fork=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'is_fork=false\n' >> "$GITHUB_OUTPUT"
          fi
  lint-hooks:
    needs: detect
    # Skip when running as the `pull_request` no-op on the `.github` repo
    # itself. Consumer thin-callers invoke via `workflow_call`, where
    # `github.event_name` is `workflow_call` and this guard passes.
    if: >-
      github.event_name != 'pull_request' ||
      github.repository != 'Rubio-Enterprises/.github'
    runs-on: ${{ fromJSON(needs.detect.outputs.runner) }}
    steps:
      - name: Check out the consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Fork-mode linting needs the PR merge commit's parents (or enough
          # history to merge-base against the base ref) to compute changed
          # files. Non-fork all-files mode is unaffected by the extra commit.
          fetch-depth: 2
      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true), enforcing minimum_release_age via uv's --exclude-newer.
      # Without uv, mise >= 2026.6.2 falls back to pip's --uploaded-prior-to,
      # which cold runners' bootstrap pip (< 26) rejects — install hard-fails.
      - name: Install uv (routes mise pipx installs through uvx)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install consumer-repo runtimes (lefthook + pinned hook tools)
        uses: jdx/mise-action@v4
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.11"
      - name: Install pnpm (for lefthook.local.yml hooks invoking pnpm)
        # Mirrors the pattern in e2e.yml — gated on pnpm-lock.yaml presence
        # so python/swift consumers (no Node) get a free no-op. Reads
        # `packageManager` from package.json for version pinning, avoiding
        # the corepack keyring drift documented in e2e.yml's adjacent block.
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - name: Install JS deps (so lefthook.local.yml pnpm hooks resolve workspace packages)
        # pnpm/action-setup@v4 installs the pnpm binary but does NOT populate
        # node_modules. Consumer lefthook.local.yml hooks like `pnpm exec sherif`
        # or `pnpm --filter @ws/x check` require the workspace to be installed.
        # Surfaced 2026-05-17 by karakeep PR #5 v1.1.16 re-run (Plan 3 Task 48):
        # `pnpm exec sherif` failed with ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL
        # because sherif (a devDep) wasn't in node_modules.
        if: hashFiles('pnpm-lock.yaml') != ''
        run: pnpm install --frozen-lockfile
        shell: bash
      - name: Run lefthook pre-commit across all files
        if: needs.detect.outputs.is_fork != 'true'
        # MISE_ENV=ci is forwarded so any mise env-conditional config behaves
        # the same as the audit job. `--all-files` walks the repo tree rather
        # than the empty staged-diff set CI checkouts present.
        env:
          MISE_ENV: ci
        run: mise exec -- lefthook run pre-commit --all-files
      - name: Run lefthook pre-commit on changed fork files
        if: needs.detect.outputs.is_fork == 'true'
        env:
          MISE_ENV: ci
        run: |
          set -euo pipefail
          files=/tmp/lefthook-changed-files.txt
          : > "$files"

          if git rev-parse --verify --quiet HEAD^1 >/dev/null && git rev-parse --verify --quiet HEAD^2 >/dev/null; then
            # GitHub checks out pull_request workflow_call jobs at a synthetic
            # merge commit. Diff the merge result against the base parent; this
            # needs only fetch-depth: 2 and avoids an unfetched merge base.
            git diff --name-only --diff-filter=ACMR HEAD^1 HEAD > "$files"
          elif [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=50 origin "refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            if git merge-base "origin/${GITHUB_BASE_REF}" HEAD >/dev/null; then
              git diff --name-only --diff-filter=ACMR "origin/${GITHUB_BASE_REF}...HEAD" > "$files"
            elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
              git diff --name-only --diff-filter=ACMR HEAD^ HEAD > "$files"
            else
              git ls-files > "$files"
            fi
          elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
            git diff --name-only --diff-filter=ACMR HEAD^ HEAD > "$files"
          else
            # Last-resort fallback for an unusual single-commit checkout: check
            # tracked files rather than silently skipping hook coverage.
            git ls-files > "$files"
          fi

          if [ ! -s "$files" ]; then
            echo "::notice::fork PR has no added/copied/modified/renamed files for lefthook to check"
            exit 0
          fi

          echo "Fork-mode lefthook file list:"
          sed 's/^/  /' "$files"
          mise exec -- lefthook run pre-commit --files-from-stdin < "$files"
        shell: bash
      - name: Validate commit-msg hook accepts a conventional commit
        # Writes a well-formed conventional-commit message and runs the
        # commit-msg hook against it. Smokes the commitlint config + the
        # commitlint binary's presence on PATH. Failure here means the hook
        # would reject valid commits locally.
        env:
          MISE_ENV: ci
        run: |
          printf 'feat(ci): smoke-test commit-msg hook\n' > /tmp/test-commit-msg
          mise exec -- lefthook run commit-msg --file /tmp/test-commit-msg
