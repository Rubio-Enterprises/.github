name: standards audit (reusable)
"on":
  workflow_call:
  # `pull_request` trigger is required by GitHub's organization-ruleset
  # `required_workflows` validator (422 otherwise). Consumer thin-callers
  # still invoke this workflow via `workflow_call`; the `pull_request` path
  # is a no-op on PRs against `.github` itself (skipped via the job-level
  # `if:` guard below — this repo is the bootstrap source of the reusable,
  # not a consumer, so it can't satisfy the consumer-shaped contract that
  # `scripts/check.sh` enforces).
  pull_request:
permissions:
  contents: read
jobs:
  audit:
    # Skip when running as the `pull_request` no-op on the `.github` repo
    # itself. Consumer thin-callers invoke via `workflow_call`, where
    # `github.event_name` is `workflow_call` and this guard passes.
    if: >-
      github.event_name != 'pull_request' ||
      github.repository != 'Rubio-Enterprises/.github'
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - name: Check out the consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Content resolution: read the consumer's `ring` custom property with the
      # run's own token and pick the standards channel branch. `ring == canary`
      # resolves `standards@canary`; everything else (fleet / unset / unreadable)
      # resolves `standards@stable`. Fail-safe: any read error falls through to
      # `stable`. Replaces the frozen `audit/v1` clone pin (retired after the
      # sweep); the audit content at channel tip equals the old `audit/v1`
      # content at cutover, so behavior is identical apart from the ref. Same
      # pattern as the lint-format / pr-title / secret-scan gates.
      - name: Resolve standards channel from the repo `ring` property
        id: channel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ring="$(gh api "/repos/${{ github.repository }}/properties/values" \
            --jq '.[] | select(.property_name == "ring") | .value' 2>/dev/null || true)"
          if [ "$ring" = "canary" ]; then
            channel=canary
          else
            channel=stable
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "::notice::resolved standards channel '$channel' (ring='${ring:-<unset>}')"
      # standards is private: mint a read-only standards-reader App token to clone
      # it. The org secrets reach this reusable via the consumer's `secrets: inherit`
      # (rendered into standards.yml by the template).
      - name: Mint standards-reader token (read-only on standards)
        id: standards-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.STANDARDS_READER_APP_ID }}
          private-key: ${{ secrets.STANDARDS_READER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: standards
          permission-contents: read
      - name: Check out standards@channel
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Rubio-Enterprises/standards
          ref: ${{ steps.channel.outputs.channel }}
          path: .standards
          token: ${{ steps.standards-token.outputs.token }}
          persist-credentials: false   # read-only checkout; don't leave a token in .standards/.git
      # One observable answer to "what standards version is the fleet running?".
      # The channel branch floats, so the run summary records the exact commit
      # this run executed (the same channel secret-scan.yml now resolves — no pin
      # asymmetry). This resolved-SHA echo is load-bearing for the Layer 5
      # convergence dashboard.
      - name: Echo resolved standards ref
        run: echo "standards \`${{ steps.channel.outputs.channel }}\` resolved to \`$(git -C .standards rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true), enforcing minimum_release_age via uv's --exclude-newer.
      # Without uv, mise >= 2026.6.2 falls back to pip's --uploaded-prior-to,
      # which cold runners' bootstrap pip (< 26) rejects — install hard-fails.
      - name: Install uv (routes mise pipx installs through uvx)
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Install consumer-repo runtimes
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.5"
      - name: Install audit-side tools (gitleaks, conftest, check-jsonschema)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: .standards
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.5"
      - name: Verify lockfile integrity (npm)
        # Defense-in-depth complement to the `NPM-LOCKFILE-PRESENT` audit
        # rule (scripts/check.sh, §6.6) and the template's `lockfile-drift`
        # pre-commit hook (template/lefthook.yml.jinja). Walks every
        # checked-in `package-lock.json` and runs
        # `npm ci --dry-run --ignore-scripts` — fails fast on manifest↔
        # lockfile drift without installing `node_modules`. Skipped
        # silently when no npm lockfile is present (non-npm consumers or
        # zero-dep repos). Monorepos with multiple package.json/lock
        # pairs are walked per directory. `node_modules` is pruned so
        # vendored upstream lockfiles aren't validated.
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t locks < <(find . -name node_modules -prune -o -name package-lock.json -print 2>/dev/null | sort)
          if [ "${#locks[@]}" -eq 0 ]; then
            echo "no package-lock.json files found; skipping"
            exit 0
          fi
          for lockfile in "${locks[@]}"; do
            dir="$(dirname "$lockfile")"
            echo "Verifying lockfile integrity: $dir"
            ( cd "$dir" && npm ci --dry-run --ignore-scripts )
          done
      - name: Deterministic baseline
        run: bash .standards/skills/audit-standards/scripts/check.sh
      - name: JSON Schema validation (intra-document rules)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            check-jsonschema --schemafile .standards/skills/audit-standards/schemas/package-json.schema.json package.json
          fi
          if [ -f pyproject.toml ]; then
            check-jsonschema --schemafile .standards/skills/audit-standards/schemas/pyproject.schema.json pyproject.toml
          fi
      - name: Conftest policies (relational + cross-file rules only)
        shell: bash
        run: |
          set -euo pipefail
          # package.json is included so the TS scripts.lint Biome-contract rule
          # (policy/typescript/overrides.rego) can read it under --combine.
          # deno.json / deno.jsonc are included so the Layer C deno rules
          # (policy/deno/overrides.rego) can fire on deno-cli repos.
          inputs=()
          for f in biome.json ruff.toml .golangci.yml package.json deno.json deno.jsonc; do
            [ -f "$f" ] && inputs+=("$f")
          done
          # Use an explicit `if`/`fi` instead of `[ … ] && conftest …` — under
          # `set -e -o pipefail` the test command returns 1 when the array is
          # empty (e.g. a future Deno-flavored repo without deno.json yet), and
          # the shell aborts the step before conftest is even considered.
          if [ ${#inputs[@]} -gt 0 ]; then
            conftest test --combine \
              --policy .standards/skills/audit-standards/policy \
              --data   .standards/skills/audit-standards/data/base \
              "${inputs[@]}"
          else
            echo "no conftest inputs (biome.json/ruff.toml/.golangci.yml/package.json/deno.json/deno.jsonc all absent); skipping"
          fi
      - name: Managed-content drift (strict gate)
        # §8-END enforcement flip. Runs the MD-* managed-content drift checker
        # against the consumer's committed carriers (.claude/settings.json,
        # .gitignore deny-block, release-please manifest). CHECK_MANAGED_CONTENT_STRICT=1
        # turns the default reporter (always exit 0) into a GATE: exit 1 when any
        # FAIL row is emitted. This is the channel that propagates the org plugin
        # superset (MD-05/07/08) and the now-FAIL-tier MD-09 deny-block to the
        # fleet — the standards check.sh baseline above does not run it.
        # Requires mikefarah yq, pinned audit-side in standards/.mise.toml and
        # installed by the `working_directory: .standards` mise step above; the
        # checker SKIPs (exit 0) if yq/jq are absent, so the pin is load-bearing.
        shell: bash
        run: CHECK_MANAGED_CONTENT_STRICT=1 bash .standards/skills/audit-standards/scripts/check-managed-content.sh
