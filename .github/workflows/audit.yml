name: standards audit (reusable)
on:
  workflow_call:
  # `pull_request` trigger is required by GitHub's organization-ruleset
  # `required_workflows` validator (422 otherwise). Consumer thin-callers
  # still invoke this workflow via `workflow_call`; the `pull_request` path
  # is only exercised on PRs against `.github` itself (no-op there).
  pull_request:
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the consumer repo
        uses: actions/checkout@v6
      - name: Check out standards (pinned)
        uses: actions/checkout@v6
        with:
          repository: Rubio-Enterprises/standards
          ref: v1.1.0
          path: .standards
      - name: Install consumer-repo runtimes
        uses: jdx/mise-action@v4
      - name: Install audit-side tools (gitleaks, conftest, check-jsonschema)
        uses: jdx/mise-action@v4
        with:
          working_directory: .standards
      - name: Deterministic baseline
        run: bash .standards/scripts/check.sh
      - name: JSON Schema validation (intra-document rules)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            check-jsonschema --schemafile .standards/schemas/package-json.schema.json package.json
          fi
          if [ -f pyproject.toml ]; then
            check-jsonschema --schemafile .standards/schemas/pyproject.schema.json pyproject.toml
          fi
      - name: Conftest policies (relational + cross-file rules only)
        shell: bash
        run: |
          set -euo pipefail
          # package.json is included so the TS scripts.lint Biome-contract rule
          # (policy/typescript/overrides.rego) can read it under --combine.
          inputs=()
          for f in biome.json ruff.toml .golangci.yml package.json; do
            [ -f "$f" ] && inputs+=("$f")
          done
          [ ${#inputs[@]} -gt 0 ] && conftest test --combine \
            --policy .standards/policy \
            --data   .standards/data/base \
            "${inputs[@]}"
