name: Copilot Setup Steps

# Public-repo override for this bootstrap repo (.github is the org community-health
# + reusable-workflow repo, not a copier consumer, so it can't render the is_public
# gate — this is a hand-maintained copy of what the standards template produces).
# GitHub blocks self-hosted runners on public repos, so the org-default Copilot
# runner (labeled `code-quality`, self-hosted) would queue this repo's reviews ~24h
# and cancel them. Pin Copilot code review + coding agent to a GitHub-hosted Ubuntu
# x64 runner (free for public repos) by declaring the job's `runs-on`.
#
# `"on":` is quoted to satisfy `yaml[truthy]` (yamllint + ansible-lint): YAML 1.1
# folds bare `on` into the boolean `On`. GitHub Actions and actionlint accept both.
"on": workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
