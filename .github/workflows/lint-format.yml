name: lint-format (gate)
# Required Governance Workflow â€” the `gate-lint-format` family (see the
# governance-propagation architecture, Layer 1 + Layer 3a). Attached to consumer
# repos by a Terraform org ruleset that targets the `gate-lint-format` custom
# property; GitHub injects it as a ruleset-required workflow and auto-triggers it
# on `pull_request` / `merge_group`, IGNORING every event filter â€” so there are
# no path/branch filters here and no required `workflow_call` inputs (a
# reusable-only file can't be the required entry). Instead of shipping lint
# config into consumers, this gate resolves the canonical configs at runtime:
# it renders them from `standards@<channel>` using the consumer's OWN
# `.copier-answers.yml`, then runs the applicable linters against the consumer
# tree with explicit `--config` flags pointed at the render. Config is a pure
# function of (answers, channel ref) â€” identical everywhere, never stored,
# impossible to drift.
"on":
  pull_request:
  merge_group:
permissions:
  contents: read
concurrency:
  # Supersede an in-flight run of THIS gate when a newer commit lands on the same
  # PR. Namespaced to this workflow via `github.workflow`; gated to pull_request
  # so a merge_group run is never cancelled. Mirrors the consumer standards.yml
  # concurrency shape.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint-format:
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - name: Check out the consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Fork-mode linting (below) needs the PR merge commit's parents (or
          # enough history to merge-base against the base ref) to compute the
          # PR's changed files. Non-fork all-files mode is unaffected by the
          # extra commit. Mirrors lint-hooks.yml's fetch-depth: 2.
          fetch-depth: 2

      - name: Detect onboarding and fork status
        # Fail-open for repos that carry the gate property but have no
        # `.copier-answers.yml` (a brand-new repo targeted before onboarding
        # completes). The whole gate short-circuits to a green notice rather than
        # blocking a repo it can't meaningfully lint â€” the un-onboarded state is
        # visible on the convergence dashboard, never a silent block.
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .copier-answers.yml ]; then
            echo "::notice::no .copier-answers.yml â€” repo is not standards-onboarded; lint-format gate passes (fail-open)"
            echo "onboarded=false" >> "$GITHUB_OUTPUT"
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          # A minimal-render repo_type declines lint-format from the type:
          # nothing is rendered (no lint configs, no .mise.toml copier pin),
          # so there is nothing to lint â€” same green short-circuit as the
          # un-onboarded branch above.
          elif grep -qE '^repo_type:[[:space:]]*(pristine_fork|governance_repo)' .copier-answers.yml 2>/dev/null; then
            echo "::notice::repo_type declines lint-format (minimal render); gate passes"
            echo "onboarded=false" >> "$GITHUB_OUTPUT"
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          else
            echo "onboarded=true" >> "$GITHUB_OUTPUT"
            # Fork detection keyed on repo_type (ADR-0013), the SAME expression
            # as lint-hooks.yml, so a fork lints only its PR's changed files
            # below and never blocks on inherited upstream lint debt. The
            # boolean `is_fork` answer this used to grep was retired in
            # template v1.55.24 â€” which silently flipped forks to full-tree
            # mode while the grep still keyed on it; the legacy grep stays as
            # a fallback for consumers on a pre-retirement render (identical
            # behavior, removable once the fleet is fully >= v1.55.24).
            if grep -qE '^repo_type:[[:space:]]*(extended_fork|pristine_fork)' .copier-answers.yml 2>/dev/null ||
              grep -qE '^is_fork:[[:space:]]*true' .copier-answers.yml 2>/dev/null; then
              echo "is_fork=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_fork=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve standards channel from the repo `ring` property
        # Content resolution: read the consumer's `ring` custom property with the
        # run's own token (metadata read is implicit) and pick the channel branch.
        # `ring == canary` resolves `standards@canary`; everything else (incl.
        # `fleet` / unset / unreadable) resolves `standards@stable`. Fail-safe:
        # any read error falls through to `stable`.
        if: steps.detect.outputs.onboarded == 'true'
        id: channel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ring="$(gh api "/repos/${{ github.repository }}/properties/values" \
            --jq '.[] | select(.property_name == "ring") | .value' 2>/dev/null || true)"
          if [ "$ring" = "canary" ]; then
            channel=canary
          else
            channel=stable
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "::notice::resolved standards channel '$channel' (ring='${ring:-<unset>}')"

      # standards is private: mint a read-only standards-reader App token to clone
      # it. On a ruleset-injected run the org STANDARDS_READER_APP_* secrets are
      # available directly (proven by the injected audit today). Fork PRs on
      # public repos get no secrets â€” the mint fails and the gate fails visibly
      # (accepted per the security model), rather than silently skipping.
      - name: Mint standards-reader token (read-only on standards)
        if: steps.detect.outputs.onboarded == 'true'
        id: standards-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.STANDARDS_READER_APP_ID }}
          private-key: ${{ secrets.STANDARDS_READER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: standards
          permission-contents: read

      - name: Check out standards@channel
        if: steps.detect.outputs.onboarded == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Rubio-Enterprises/standards
          ref: ${{ steps.channel.outputs.channel }}
          path: .standards
          token: ${{ steps.standards-token.outputs.token }}
          persist-credentials: false # read-only checkout; don't leave a token in .standards/.git

      - name: Echo resolved standards ref
        if: steps.detect.outputs.onboarded == 'true'
        shell: bash
        run: echo "standards \`${{ steps.channel.outputs.channel }}\` resolved to \`$(git -C .standards rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"

      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true). Without uv, mise >= 2026.6.2 falls back to pip's
      # --uploaded-prior-to, which cold runners' bootstrap pip (< 26) rejects â€”
      # the pipx:copier / pipx:yamllint / pipx:ruff installs hard-fail.
      - name: Install uv (routes mise pipx installs through uvx)
        if: steps.detect.outputs.onboarded == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install consumer-repo runtimes (copier + pinned linters)
        # The consumer's own .mise.toml pins copier, yq, markdownlint-cli2,
        # yamllint (universal) plus ruff (py-*) / biome (ts-* / embedded-web).
        # Running the render + linters through mise pins tool versions
        # identically to the consumer's local hooks. Secret scanning (gitleaks)
        # is owned exclusively by the gate-secret-scan family â€” never run here.
        if: steps.detect.outputs.onboarded == 'true'
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"

      - name: Render canonical lint configs from standards@channel
        # copier renders the WHOLE template into a scratch dir driven by the
        # consumer's own answers; the `_tasks` merge hooks merge the seeded
        # consumer `.local` sidecars into the final `.markdownlint-cli2.jsonc` /
        # `.yamllint` (floor âŠ• local). `_migrations` do NOT run on `copier copy`
        # (only on update), so the divergence-detector can't abort this render.
        # The `_`-prefixed metadata keys are stripped from the answers so copier
        # only sees question answers.
        if: steps.detect.outputs.onboarded == 'true'
        id: render
        env:
          RENDER_DIR: ${{ runner.temp }}/render
        shell: bash
        run: |
          set -euo pipefail
          mise exec -- yq 'with_entries(select(.key | test("^_") | not))' \
            .copier-answers.yml > "$RUNNER_TEMP/answers.yml"
          # Seed the consumer's committed `.local` config sidecars into the
          # scratch destination BEFORE copier runs, so the `_tasks` merge hooks
          # (merge-yamllint.sh / merge-markdownlint.sh) compose floor âŠ• local
          # exactly as a real consumer render does. Without this the render is
          # floor-only, so a consumer's legitimately-declared relaxations (extra
          # `ignore`/`ignores` globs or rule overrides in `.yamllint.local` /
          # `.markdownlint-cli2.jsonc.local` / `ruff.toml.local` /
          # `biome.json.local`) would fail CI while passing locally.
          # These four are the ONLY lint-config sidecars the merge hooks consume;
          # the template renders them nowhere (they sit in `_skip_if_exists`), so
          # seeding them into the non-empty dest is conflict-free.
          mkdir -p "$RENDER_DIR"
          for sidecar in .markdownlint-cli2.jsonc.local .yamllint.local ruff.toml.local biome.json.local; do
            if [ -f "$sidecar" ]; then
              cp "$sidecar" "$RENDER_DIR/$sidecar"
              echo "seeded consumer sidecar $sidecar into the scratch render"
            fi
          done
          # `--vcs-ref=HEAD` is LOAD-BEARING: copier defaults --vcs-ref to the
          # latest git TAG, which would render an old tagged template instead of
          # the checked-out channel-branch tip. HEAD pins the render to the exact
          # `standards@<channel>` commit that actions/checkout placed in
          # .standards â€” the whole point of channel resolution.
          mise exec -- copier copy \
            --vcs-ref=HEAD \
            --data-file "$RUNNER_TEMP/answers.yml" \
            --defaults --trust \
            .standards "$RENDER_DIR"
          echo "rendered canonical configs into $RENDER_DIR"
          # The checkout's last use is the render above. Move it out of the
          # consumer tree so tree scanners (e.g. biome's nested-config
          # discovery, which chokes on non-config files named biome.json)
          # never parse its contents.
          mv .standards "$RUNNER_TEMP/standards-src"

      - name: Run linters against the consumer tree
        # Which linters apply is derived from the archetype (mirrors the
        # per-archetype lefthook.yml.jinja hooks): markdownlint / yamllint are
        # universal; ruff for has_python; biome for has_javascript or
        # has_typescript (unless linter_floor=oxc) OR has_embedded_web â€” all
        # from the declared facets (the archetype fallback is retired). Each
        # linter uses the rendered config via its explicit config flag. Failures are collected so every
        # linter reports, not just the first to fail. Secret scanning (gitleaks)
        # is owned by the gate-secret-scan family â€” not run here.
        # shellcheck / clippy / gofmt / rustfmt / prettier / pyright / deno /
        # swift* are intentionally NOT centralized here â€” they have no
        # config-path flag and are not run centrally today (they stay in the
        # lefthook/local surface); this gate does not invent that scope.
        #
        # File scope: non-fork repos lint ALL tracked files (git ls-files);
        # forks lint ONLY the PR's changed files, so inherited upstream lint
        # debt never blocks a fork PR. The changed-file resolution is ported
        # verbatim from lint-hooks.yml (same base...head logic, same
        # fetch-depth: 2 requirement on the checkout above).
        if: steps.detect.outputs.onboarded == 'true'
        env:
          RENDER_DIR: ${{ runner.temp }}/render
          IS_FORK: ${{ steps.detect.outputs.is_fork }}
        shell: bash
        run: |
          set -uo pipefail
          # The classification selects this gate's entire lint strategy, so an
          # unreadable one must stop the run, not shape it. The has_<lang>
          # facets ARE the classification; the archetype fallback is retired
          # (the question is deleted, and every governed repo was verified to
          # persist all six facets before the fallback fell). A missing or
          # non-boolean facet is unclassifiable â€” without the check below a
          # linter is silently skipped and the gate reports GREEN while
          # linting nothing. Facets are read bare (NOT with `yq // fallback`:
          # yq's `//` treats an explicit `false` like null).
          for facet_key in has_python has_javascript has_typescript has_rust has_go has_swift; do
            case "$(mise exec -- yq -r ".${facet_key}" .copier-answers.yml)" in
              true | false) ;;
              *)
                msg="missing or non-boolean '${facet_key}' answer; the facets select the lint strategy."
                echo "::error file=.copier-answers.yml::lint-format: ${msg} Refusing to report success while running no linters."
                exit 1
                ;;
            esac
          done
          linter_floor="$(mise exec -- yq -r '.linter_floor // ""' .copier-answers.yml)"
          has_embedded_web="$(mise exec -- yq -r '.has_embedded_web // false' .copier-answers.yml)"
          has_typescript="$(mise exec -- yq -r '.has_typescript' .copier-answers.yml)"
          has_javascript="$(mise exec -- yq -r '.has_javascript' .copier-answers.yml)"
          has_python="$(mise exec -- yq -r '.has_python' .copier-answers.yml)"
          echo "linter_floor=${linter_floor:-<none>} has_embedded_web=$has_embedded_web" \
            "has_typescript=$has_typescript has_javascript=$has_javascript has_python=$has_python is_fork=$IS_FORK"

          # Fork repos restrict every linter to the PR's changed files. Resolve
          # that set once, with the SAME base...head logic lint-hooks.yml uses
          # (needs the fetch-depth: 2 checkout for the synthetic merge commit's
          # parents). Non-fork repos never enter this block.
          CHANGED="$RUNNER_TEMP/lint-format-changed.txt"
          if [ "$IS_FORK" = "true" ]; then
            : > "$CHANGED"
            if git rev-parse --verify --quiet HEAD^1 >/dev/null && git rev-parse --verify --quiet HEAD^2 >/dev/null; then
              # pull_request synthetic merge commit: diff the merge result against
              # the base parent. Needs only fetch-depth: 2 and avoids an
              # unfetched merge base.
              git diff --name-only --diff-filter=ACMR HEAD^1 HEAD > "$CHANGED"
            elif [ -n "${GITHUB_BASE_REF:-}" ]; then
              git fetch --no-tags --depth=50 origin "refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
              if git merge-base "origin/${GITHUB_BASE_REF}" HEAD >/dev/null; then
                git diff --name-only --diff-filter=ACMR "origin/${GITHUB_BASE_REF}...HEAD" > "$CHANGED"
              elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
                git diff --name-only --diff-filter=ACMR HEAD^ HEAD > "$CHANGED"
              else
                git ls-files > "$CHANGED"
              fi
            elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
              git diff --name-only --diff-filter=ACMR HEAD^ HEAD > "$CHANGED"
            else
              # Last-resort fallback for an unusual single-commit checkout: lint
              # tracked files rather than silently skipping coverage.
              git ls-files > "$CHANGED"
            fi
            echo "fork repo: linting changed files only ($(grep -c . "$CHANGED" || true) candidate paths)"
          fi

          # Emit the applicable tracked files for the given git pathspecs. On a
          # fork, intersect the tracked matches with the changed-file set so only
          # PR-touched files are linted; on a non-fork, list all tracked matches
          # (parity with lefthook's git-aware `--all-files`). git owns the glob
          # matching in both modes; untracked .standards / .venv / node_modules
          # are never listed, so they are excluded automatically.
          select_files() {
            if [ "$IS_FORK" = "true" ]; then
              git ls-files -- "$@" | { grep -Fxf "$CHANGED" || true; }
            else
              git ls-files -- "$@"
            fi
          }

          fail=0

          # --- markdownlint (universal). The rendered config's `ignores`
          #     (CHANGELOG.md, node_modules, dist, plus any consumer `.local`
          #     additions) still apply to the explicit set. ---
          mapfile -t mdfiles < <(select_files '*.md')
          if [ "${#mdfiles[@]}" -gt 0 ]; then
            echo "== markdownlint-cli2 (${#mdfiles[@]} files) =="
            mise exec -- markdownlint-cli2 \
              --config "$RENDER_DIR/.markdownlint-cli2.jsonc" "${mdfiles[@]}" || fail=1
          else
            echo "no markdown files to lint; skipping markdownlint"
          fi

          # --- yamllint (universal) ---
          mapfile -t yfiles < <(select_files '*.yml' '*.yaml')
          if [ "${#yfiles[@]}" -gt 0 ]; then
            echo "== yamllint (${#yfiles[@]} files) =="
            mise exec -- yamllint -c "$RENDER_DIR/.yamllint" -- "${yfiles[@]}" || fail=1
          else
            echo "no YAML files to lint; skipping yamllint"
          fi

          # --- ruff (has_python) ---
          # Pattern F (floor âŠ• delta), same strategy as markdownlint/yamllint
          # above: the render step seeded the consumer's committed
          # `ruff.toml.local` into the scratch render, where the template's
          # merge-ruff.sh composed it over the org floor â€” so
          # `$RENDER_DIR/ruff.toml` IS floor âŠ• delta, and the gate always
          # lints with it. The consumer's checked-in ruff.toml is the
          # working-tree mirror of the same merge (copier rewrites it each
          # render) and never decides the gate. An earlier floor-enforcement
          # attempt failed repos on violations their committed configs
          # sanctioned; the sidecar seeding is what fixes that â€” declared
          # deltas merge back in. Flipped from consumer-config-wins on
          # 2026-07-20 after every divergent py repo's delta landed in
          # `ruff.toml.local`. Explicit --config disables ruff's hierarchical
          # discovery: acceptable because every gate-relevant py repo is
          # root-only (no nested ruff configs, no pyproject [tool.ruff] â€”
          # measured 2026-07-20).
          if [ "$has_python" = "true" ]; then
              mapfile -t pyfiles < <(select_files '*.py')
              if [ "${#pyfiles[@]}" -gt 0 ]; then
                echo "== ruff check (floor + delta render) =="
                mise exec -- ruff check --config "$RENDER_DIR/ruff.toml" -- "${pyfiles[@]}" || fail=1
                echo "== ruff format --check (floor + delta render) =="
                mise exec -- ruff format --check --config "$RENDER_DIR/ruff.toml" -- "${pyfiles[@]}" || fail=1
              else
                echo "no Python files to lint; skipping ruff"
              fi
          fi

          # --- biome (has_javascript or has_typescript unless oxc, OR has_embedded_web) ---
          # Strategy selection is facet-driven; the has_embedded_web leg is a
          # declared answer and stays as-is.
          run_biome=false
          if [ "$has_typescript" = "true" ] || [ "$has_javascript" = "true" ]; then
            [ "$linter_floor" != "oxc" ] && run_biome=true
          fi
          [ "$has_embedded_web" = "true" ] && run_biome=true
          if [ "$run_biome" = "true" ]; then
            # Exclude lint/tooling config files from the lint INPUTS (this is
            # about what gets linted, not which config governs â€” see below):
            # biome schema-validates config-shaped input files against the
            # CLI's schema version, so a biome.json whose $schema lags the
            # mise-pinned CLI turns into a deserialize ERROR â€” observed
            # fleet-live on riveroaks-scraper PR #110 at cutover (schema
            # 2.4.15 vs CLI 2.5.0) â€” and biome demands its own formatting of
            # them (.markdownlint-cli2.jsonc format errors, same PR).
            # .markdownlint-cli2.jsonc / commitlint.config.cjs / renovate.json
            # are template-rendered residue (conformance is the audit's
            # jurisdiction); biome.json(c) is consumer-owned (Pattern D) but
            # equally noise as a lint input.
            mapfile -t jsfiles < <(select_files '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' '*.json' '*.jsonc' \
              | grep -vE '(^|/)(biome\.jsonc?|\.markdownlint-cli2\.jsonc|commitlint\.config\.cjs|renovate\.json)$' || true)
            if [ "${#jsfiles[@]}" -gt 0 ]; then
              # Pattern F (floor âŠ• delta), same strategy as ruff above,
              # keyed on the committed `biome.json.local` sidecar: a repo
              # that declared its delta was converted (its checked-in
              # biome.json is merge-biome.sh's own output, the working-tree
              # mirror of the same merge), so the gate lints with the
              # rendered floor âŠ• delta config the seeding step composed.
              # A repo with a biome config but NO sidecar is not yet
              # converted â€” its biome.json may diverge from the floor in
              # undeclared ways (the divergence guard drops the fragment for
              # it at render time), so the consumer config still decides
              # (Pattern D fallback; the one deliberate holdout is tracked
              # in its own repo issue). Floor render remains the default for
              # repos with no biome config at all. Flipped from
              # consumer-config-wins on 2026-07-20 after the conversion
              # wave landed every other divergent repo's delta in
              # `biome.json.local`.
              # NEVER --config-path here: biome anchors a config's relative
              # globs (files.includes negations, overrides[].includes) to the
              # directory CONTAINING the config, so a config resolved from
              # $RENDER_DIR silently un-matches every path-scoped glob of the
              # checkout â€” delta-excluded dirs get linted and delta overrides
              # stop applying. Observed live the day of the floor-delta flip
              # (todoist-classify PR #162: override-exempted ui/** files
              # re-erroring, 9 delta-excluded files re-included). Materialize
              # the rendered config at the checkout root instead â€” the
              # checkout is ephemeral, and for converted repos the committed
              # biome.json is merge-biome.sh's own output of the same merge.
              if [ -f biome.json.local ]; then
                if [ ! -f "$RENDER_DIR/biome.json" ]; then
                  # The resolved standards channel predates the biome
                  # fragment rename â€” linting config-less here would apply
                  # biome defaults, not the org floor. Fail loudly instead.
                  echo "::error::biome.json.local is committed but the render produced no biome.json;" \
                    "the resolved standards channel predates the biome floor fragment"
                  fail=1
                else
                  echo "== biome check (floor + delta render) =="
                  cp "$RENDER_DIR/biome.json" biome.json
                  mise exec -- biome check \
                    --no-errors-on-unmatched -- "${jsfiles[@]}" || fail=1
                fi
              elif [ -f biome.json ] || [ -f biome.jsonc ]; then
                echo "== biome check (consumer config; unconverted repo) =="
                mise exec -- biome check \
                  --no-errors-on-unmatched -- "${jsfiles[@]}" || fail=1
              elif [ -f "$RENDER_DIR/biome.json" ]; then
                echo "== biome check (floor render) =="
                cp "$RENDER_DIR/biome.json" biome.json
                mise exec -- biome check \
                  --no-errors-on-unmatched -- "${jsfiles[@]}" || fail=1
              else
                # No consumer config and the resolved channel rendered no
                # floor (pre-fragment channel): biome defaults would lint
                # here, which is not the org floor. Fail loudly, mirroring
                # the converted-repo branch above.
                echo "::error::no biome config available â€” the render produced no biome.json" \
                  "and the repo commits none; the resolved standards channel predates the biome floor fragment"
                fail=1
              fi
            else
              echo "biome applies but no JS/TS/JSON files to lint; skipping"
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more linters reported violations (see the step log above)"
            exit 1
          fi
          echo "all applicable linters passed"

  gate:
    # Bucket job (always-reporting summary). A ruleset-required workflow that
    # never reports a conclusion blocks its PR forever, so this job runs on
    # every event and fails ONLY when a real dependency failed or was cancelled.
    # A skipped dependency (the fail-open un-onboarded path leaves the job
    # succeeded, never skipped) does not fail the gate.
    needs: [lint-format]
    if: always()
    runs-on: ${{ fromJSON(vars.RUNNER_GLUE || '["ubuntu-slim"]') }}
    steps:
      - name: Aggregate gate result
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "dependency results: $RESULTS"
          for r in $RESULTS; do
            case "$r" in
              failure|cancelled)
                echo "::error::lint-format gate failed (a dependency reported '$r')"
                exit 1
                ;;
            esac
          done
          echo "lint-format gate passed"
