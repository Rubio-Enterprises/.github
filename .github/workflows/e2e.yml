# Reusable e2e workflow. Runs `mise run e2e` (or `npm run e2e` fallback) inside
# a Playwright-shaped job after installing the consumer's mise toolchain +
# lockfile-pinned JS deps + `mise run e2e-setup` (Playwright browser install).
#
# DEV-SERVER CONTRACT
# -------------------
# This workflow does NOT start a dev server before invoking `playwright test`.
# Consumers must EITHER:
#   (a) Wire `playwright.config.ts::webServer` to self-start the app under
#       test (Playwright runs the command and waits on the URL before the
#       first test runs). Single-process projects (Next.js dev, Vite dev, a
#       static-site preview) fit cleanly here.
#   (b) Skip this reusable entirely and call Playwright from the consumer's
#       own `ci.yml`, with explicit prior steps for multi-process boots
#       (e.g. `ng build` → `ng serve &` → `wait-on http://localhost:4200`
#       → `playwright test` for Angular + Electron + Playwright shapes).
# Option (b) is the expected path for any project where `config.webServer`
# would have to orchestrate more than one long-running process. Don't try to
# add `jobs.e2e.needs: <build-job>` to retrofit this reusable into multi-step
# starts — the dev-server step must run *in the same job* as `playwright
# test` because Playwright connects to localhost on the same runner.
#
# See also: rubio-standards README.md "Reusable e2e.yml contract" section.
name: e2e (reusable)
"on":
  workflow_call:
    inputs:
      retries: {type: number, default: 2}
      shard: {type: string, default: ''}
      timeout-minutes: {type: number, default: 30}
permissions:
  contents: read
jobs:
  e2e:
    # TODO: route to RUNNER_GLUE once the glue runner image carries Playwright browser deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # uv on PATH routes mise's pipx-backend installs through uvx (pipx.uvx
      # defaults true), enforcing minimum_release_age via uv's --exclude-newer.
      # Without uv, mise >= 2026.6.2 falls back to pip's --uploaded-prior-to,
      # which cold runners' bootstrap pip (< 26) rejects — install hard-fails.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      # Fingerprint the uv-resolved python into the mise cache key (standards#331).
      # mise routes pipx installs through uvx, whose venvs carry a shebang pointing
      # at the uv-MANAGED python under ~/.local/share/uv/python — OUTSIDE the
      # ~/.local/share/mise tree jdx/mise-action caches. When uv's default python
      # bumps (e.g. 3.14.3 → 3.14.4), a cache restored onto a fresh runner VM hands
      # back pipx venvs whose shebang points at an interpreter that VM lacks, so
      # every tool dies with "couldn't exec process" — a permanently poisoned cache
      # no re-run fixes. Folding the version into cache_key_prefix makes a python
      # bump INVALIDATE the cache instead of poisoning it. `uv python find` never
      # downloads and can fall back to a system python, so install first
      # (idempotent — the same managed interpreter uvx would provision anyway),
      # then read the managed version.
      - name: Fingerprint the uv-resolved python for the mise cache key
        id: uv-python
        shell: bash
        run: |
          set -euo pipefail
          uv python install
          version="$(uv python find --managed-python --show-version)"
          if [ -z "$version" ]; then
            echo "::error::could not resolve the uv-managed python version for the mise cache key" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          echo "uv-resolved python for mise cache key: $version"
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          # Key the mise cache to the uv-resolved python (standards#331): a python
          # bump changes the prefix and invalidates rather than poisons the cache.
          cache_key_prefix: mise-v1-uvpy${{ steps.uv-python.outputs.version }}
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"
      - id: detect
        run: |
          set -euo pipefail
          # Ground truth: package.json scripts.e2e. The template renders a mise
          # [tasks.e2e] for every ts-* archetype that delegates to `npm run e2e`,
          # so the mise task's presence is NOT a reliable signal — what matters is
          # whether scripts.e2e itself resolves. ensure-pkg-e2e-script.sh _tasks
          # hook in standards/copier.yml auto-injects scripts.e2e when
          # @playwright/test is a (dev)dependency, so this gate aligns naturally
          # with "consumer actually has Playwright wired up".
          # Surfaced 2026-05-17 by karakeep PR #5 (Plan 3 Task 45 follow-up):
          # karakeep has the rendered mise e2e task BUT no @playwright/test (it
          # uses `playwright` the lib for scraping, not @playwright/test) so
          # ensure-pkg-e2e-script.sh correctly didn't add scripts.e2e; the prior
          # detect picked the mise path and failed inside `npm run e2e`.
          if [ -f package.json ] && jq -e '.scripts.e2e' package.json >/dev/null; then
            if mise tasks ls --json 2>/dev/null | jq -e '.[] | select(.name=="e2e")' >/dev/null; then
              echo "cmd=mise run e2e" >> "$GITHUB_OUTPUT"
            else
              echo "cmd=npm run e2e" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::notice::no scripts.e2e in apex package.json — skipping (consumer either opts out via has_e2e=false or has no Playwright harness wired)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      # Stand up pnpm via the first-party `pnpm/action-setup` action rather
      # than `corepack pnpm install`. Corepack ≤ 0.29 (bundled with Node
      # 22.0–22.12) ships a stale pnpm signing-key trust store and crashes
      # with `Cannot find matching keyid` when it tries to fetch the latest
      # stable version. `pnpm/action-setup@v4` reads the consumer's
      # `packageManager` field in package.json and installs exactly that
      # version without going through corepack. The step is a no-op when
      # `pnpm-lock.yaml` is absent.
      - if: steps.detect.outputs.skip != 'true' && hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - name: Install JS deps (lockfile-aware)
        if: steps.detect.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            if   [ -f pnpm-lock.yaml ];      then pnpm install --frozen-lockfile
            elif [ -f yarn.lock ];           then corepack yarn install --frozen-lockfile
            elif [ -f bun.lock ] || [ -f bun.lockb ]; then bun install --frozen-lockfile
            elif [ -f package-lock.json ];   then npm ci
            else echo "::error::package.json without lockfile"; exit 1
            fi
          fi
        shell: bash
      - name: e2e-setup (browser install, fixtures, etc.)
        if: steps.detect.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if mise tasks ls --json 2>/dev/null | jq -e '.[] | select(.name=="e2e-setup")' >/dev/null; then
            mise run e2e-setup
          fi
        shell: bash
      - if: steps.detect.outputs.skip != 'true'
        env:
          PW_RETRIES: ${{ inputs.retries }}
          PW_SHARD: ${{ inputs.shard }}
        run: ${{ steps.detect.outputs.cmd }}
        timeout-minutes: ${{ inputs.timeout-minutes }}
      - if: always() && steps.detect.outputs.skip != 'true'
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        with: {report_paths: 'reports/e2e/junit.xml'}
      - if: always() && steps.detect.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-reports-${{ github.run_id }}
          path: reports/e2e/
          retention-days: 14
